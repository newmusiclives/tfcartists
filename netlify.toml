# Netlify Configuration for TrueFans RADIO

[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"

[functions]
  included_files = ["prisma/schema.prisma"]

# Next.js Plugin - handles API routes, SSR, and static pages automatically
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Remove audio files from server function to stay under 250MB limit
[[plugins]]
  package = "./netlify/plugins/slim-functions"

# Scheduled Functions (Cron Jobs)
# Note: Scheduled functions require Netlify Pro plan or higher
# Schedules are defined in netlify/functions/*.ts files using @netlify/functions

# Proxy Icecast stream through Netlify to avoid mixed-content (HTTP→HTTPS) blocks
[[redirects]]
  from = "/stream/*"
  to = "http://89.167.23.152:8000/:splat"
  status = 200
  force = true

# Security headers are managed in middleware.ts to avoid conflicts
