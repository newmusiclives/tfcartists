name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Prisma client
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}

      - name: Cache Next.js
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

  prisma-check:
    name: Prisma Schema Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Prisma schema
        run: npx prisma validate

      - name: Check Prisma client is in sync
        run: |
          npx prisma generate
          # Verify no generated file diffs (schema matches client)
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Prisma client is out of sync with schema. Run 'npx prisma generate' and commit the changes."
            git diff --name-only
            exit 1
          fi

      - name: Check for pending schema changes
        run: |
          # Format the schema and check if it changes
          npx prisma format
          if [ -n "$(git diff --name-only prisma/)" ]; then
            echo "::warning::Prisma schema is not formatted. Run 'npx prisma format' to fix."
            git diff prisma/
          fi

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [quality, prisma-check]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Prisma client
        uses: actions/cache@v4
        with:
          path: node_modules/.prisma
          key: prisma-${{ runner.os }}-${{ hashFiles('prisma/schema.prisma') }}

      - name: Cache Next.js build
        uses: actions/cache@v4
        with:
          path: .next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-${{ hashFiles('**/*.ts', '**/*.tsx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('package-lock.json') }}-
            nextjs-${{ runner.os }}-

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          NEXTAUTH_SECRET: "ci-build-check-secret-key-not-real-32chars"
          NEXTAUTH_URL: "http://localhost:3000"

  pr-comment:
    name: PR Status Comment
    runs-on: ubuntu-latest
    needs: [quality, prisma-check, build]
    # Run even if previous jobs failed so we can report the failure
    if: always() && github.event_name == 'pull_request'
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const quality = '${{ needs.quality.result }}';
            const prisma = '${{ needs.prisma-check.result }}';
            const build = '${{ needs.build.result }}';

            const icon = (status) => status === 'success' ? '✅' : status === 'skipped' ? '⏭️' : '❌';
            const allPassed = quality === 'success' && prisma === 'success' && build === 'success';

            const body = [
              `## ${allPassed ? '✅' : '❌'} CI Results`,
              '',
              '| Check | Status |',
              '|-------|--------|',
              `| Lint, Typecheck & Test | ${icon(quality)} ${quality} |`,
              `| Prisma Schema Check | ${icon(prisma)} ${prisma} |`,
              `| Build Verification | ${icon(build)} ${build} |`,
              '',
              `*Commit: \`${context.sha.substring(0, 7)}\`*`,
            ].join('\n');

            // Find existing bot comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('CI Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
