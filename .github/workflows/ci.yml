name: CI

on:
    push:
      branches: [main]
    pull_request:
      branches: [main]

env:
    DATABASE_URL: "postgresql://dummy:dummy@localhost:5432/dummy"
    NEXTAUTH_SECRET: "ci-test-secret"
    NEXTAUTH_URL: "http://localhost:3000"

jobs:
    lint-and-typecheck:
      name: Lint & Typecheck
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm
        - run: npm ci
        - run: npx prisma generate
        - run: npx tsc --noEmit
        - run: npx next lint
          continue-on-error: true

    test:
      name: Test
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm
        - run: npm ci
        - run: npx prisma generate
        - run: npm test

    build:
      name: Build
      runs-on: ubuntu-latest
      needs: [lint-and-typecheck, test]
      steps:
        - uses: actions/checkout@v4
        - uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm
        - run: npm ci
        - run: npm run build
