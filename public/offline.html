<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline | TrueFans RADIO</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a0f00;
      color: #fef3c7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .container {
      text-align: center;
      max-width: 480px;
    }
    .icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.7;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
      color: #fbbf24;
    }
    p {
      font-size: 1.1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      opacity: 0.85;
    }
    button {
      background: #78350f;
      color: #fef3c7;
      border: none;
      padding: 0.75rem 2rem;
      font-size: 1rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #92400e;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F4E1;</div>
    <h1>You're Offline</h1>
    <p>
      It looks like you've lost your internet connection.
      TrueFans RADIO needs a connection to stream live music.
    </p>
    <p>
      Check your Wi-Fi or cellular connection and try again.
    </p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
